<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- HEADER -->
  <div class="header">
    <h1>📚 Quản Lý Thư Viện</h1>
    <span>JavaScript Project</span>
  </div>
  <div class="main">
    <div>
      <div class="card">
        <h2>➕ Thêm sách mới</h2>
 
        <label for="inputTen">Tên sách</label>
        <input type="text" id="inputTen" placeholder="Nhập tên sách..." />
 
        <label for="inputTacGia">Tác giả</label>
        <input type="text" id="inputTacGia" placeholder="Nhập tên tác giả..." />
 
        <label for="inputTheLoai">Thể loại</label>
        <input type="text" id="inputTheLoai" placeholder="VD: Tiểu thuyết, CNTT..." />
 
        <label for="inputNam">Năm xuất bản</label>
        <input type="number" id="inputNam" placeholder="VD: 2023" />
 
        <button id="btnThem">+ Thêm vào thư viện</button>
 
        <div id="thongBao"></div>
      </div>
    </div>
 
    <div style="display: flex; flex-direction: column; gap: 1rem;">
 
      <div class="stats">
        <div class="stat">
          <div class="num" id="tongSach">0</div>
          <div class="lbl">Tổng sách</div>
        </div>
        <div class="stat">
          <div class="num" id="tongTheLoai">0</div>
          <div class="lbl">Thể loại</div>
        </div>
      </div>
 
      <div class="card">
        <h2>📋 Danh sách sách</h2>
 
        <div class="search-wrap">
          <input
            type="text"
            id="inputTimKiem"
            placeholder="🔍 Tìm theo tên sách hoặc tác giả..."
          />
        </div>
 
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Tên sách</th>
              <th>Tác giả</th>
              <th>Thể loại</th>
              <th>Năm</th>
              <th>Trạng Thái</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="bangSach">
            <tr>
              <td colspan="6" class="empty">Chưa có sách nào. Hãy thêm sách mới!</td>
            </tr>
          </tbody>
        </table>
      </div>
 
    </div>
  </div>
 
<!-- MODAL MƯỢN SÁCH -->
  <div id="modalMuon" style="display:none; position:fixed; inset:0;
       background:rgba(0,0,0,0.4); z-index:999;">
    <div style="background:#fff; border-radius:10px; padding:1.5rem;
                width:340px; box-shadow:0 8px 32px rgba(0,0,0,0.15);
                margin:auto; margin-top:15%;">

      <h2 style="font-size:15px; margin-bottom:1rem; color:#2c2416;">📖 Mượn sách</h2>

      <label style="font-size:13px; color:#6b5a3e;">Tên người mượn</label>
      <input type="text" id="inputNguoiMuon" placeholder="Nhập tên người mượn..."
             style="width:100%; padding:8px 10px; margin-top:4px; margin-bottom:12px;
                    border:1px solid #d4c9b0; border-radius:6px; font-size:14px;
                    background:#faf8f4; outline:none;"/>

      <label style="font-size:13px; color:#6b5a3e;">Ngày mượn</label>
      <input type="date" id="inputNgayMuon"
             style="width:100%; padding:8px 10px; margin-top:4px; margin-bottom:1.5rem;
                    border:1px solid #d4c9b0; border-radius:6px; font-size:14px;
                    background:#faf8f4; outline:none;"/>

      <div style="display:flex; gap:8px;">
        <button onclick="xacNhanMuon()"
                style="flex:1; padding:9px; background:#2c2416; color:#f5f0e8;
                       border:none; border-radius:6px; font-size:14px; cursor:pointer;">
          Xác nhận mượn
        </button>
        <button onclick="dongModal()"
                style="flex:1; padding:9px; background:#f0ebe0; color:#2c2416;
                       border:none; border-radius:6px; font-size:14px; cursor:pointer;">
          Huỷ
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
